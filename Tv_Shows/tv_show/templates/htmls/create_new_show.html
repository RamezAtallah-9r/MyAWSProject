<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Add New Show</title>
</head>

<body class="bg-gray-950 text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-900">
        <div class="max-w-5xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-wide">
                📺 Add New Show
            </h1>

            <a href="#" class="text-red-400 hover:text-red-300 transition font-medium">
                ← Go Back
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-10">

        <div class="w-full max-w-2xl bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl p-8">

            <h2 class="text-2xl font-semibold mb-8 text-center">
                Create a New TV Show
            </h2>

            <form action="{% url 'tv_show:create_new_show' %}" method="POST" class="space-y-6">

                <!-- Show Title -->
                <div>
                    <label for="show-title" class="block mb-2 text-sm font-medium text-gray-300">
                        Show Title
                    </label>
                    <input type="text" id="show-title" name="show_title" placeholder="Breaking Bad"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500">
                </div>

                <!-- Network & Release Date -->
                <div class="grid md:grid-cols-2 gap-6">

                    <div>
                        <label for="network" class="block mb-2 text-sm font-medium text-gray-300">
                            Network
                        </label>
                        <input type="text" id="network" name="network" placeholder="Netflix"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>

                    <div>
                        <label for="release-date" class="block mb-2 text-sm font-medium text-gray-300">
                            Release Date
                        </label>
                        <input type="date" id="release-date" name="release_date"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>

                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block mb-2 text-sm font-medium text-gray-300">
                        Description
                    </label>
                    <textarea id="description" name="description" rows="5"
                        placeholder="Write a brief description of the show..."
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-red-500"></textarea>
                </div>

                <!-- Submit Button -->
                <div class="pt-2">
                    <button type="submit"
                        class="w-full bg-red-600 hover:bg-red-700 transition py-3 rounded-lg font-semibold text-lg shadow-lg">
                        Create Show
                    </button>
                </div>

            </form>

        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 bg-gray-900">
        <div class="max-w-5xl mx-auto px-6 py-4 text-center text-gray-500 text-sm">
            TV Shows Dashboard © 2026
        </div>
    </footer>

</body>

</html>
