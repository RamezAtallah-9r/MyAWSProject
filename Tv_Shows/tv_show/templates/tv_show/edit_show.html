<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Edit Show</title>
</head>

<body class="bg-gray-950 text-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-gray-800 bg-gray-900">
        <div class="max-w-5xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-wide">
                📺 Edit Show
            </h1>

            <a href="{% url 'tv_show:all_shows' %}" class="text-red-400 hover:text-red-300 transition font-medium">
                ← Go Back
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-10">

        <div class="w-full max-w-2xl bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl p-8">

            <h2 class="text-2xl font-semibold mb-8 text-center">
                Edit TV Show
            </h2>

            <form action="{% url 'tv_show:update_show' show.id %}" method="POST" class="space-y-6">
            
                {% csrf_token %}
            
                <!-- Show Title -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">
                        Show Title
                    </label>
                    <input type="text" name="title" value="{{ show.title }}"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
            
                <!-- Network & Release Date -->
                <div class="grid md:grid-cols-2 gap-6">
            
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">
                            Network
                        </label>
                        <input type="text" name="network" value="{{ show.network }}"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
            
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">
                            Release Date
                        </label>
                        <input type="date" name="release_date" value="{{ show.release_date|date:'Y-m-d' }}"
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
            
                </div>
            
                <!-- Description -->
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">
                        Description
                    </label>
                    <textarea name="description" rows="5"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-red-500">{{ show.description }}</textarea>
                </div>
            
                <!-- Submit Button -->
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 transition py-3 rounded-lg font-semibold text-lg">
                    Update Show
                </button>
            
            </form>

        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 bg-gray-900">
        <div class="max-w-5xl mx-auto px-6 py-4 text-center text-gray-500 text-sm">
            TV Shows Dashboard © 2026
        </div>
    </footer>

</body>

</html>
